<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 | BUCETA LANCHES</title>
    <link rel="icon" href="assets/logo-original.png" type="image/png" />
    <style>
      :root {
        color: #15100c;
        background: #ffc636;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
      }

      main {
        width: min(680px, 100%);
        padding: 32px;
        border: 4px solid #15100c;
        border-radius: 8px;
        background: #fff7e9;
        box-shadow: 10px 10px 0 #f0442e;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(3rem, 14vw, 8rem);
        line-height: 0.9;
      }

      p {
        color: #826d5e;
        font-size: 1.1rem;
      }

      a {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        margin-top: 12px;
        padding: 0 18px;
        border-radius: 8px;
        color: #fff;
        background: #15100c;
        font-weight: 900;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>Esse lanche saiu para entrega e nunca mais voltou.</p>
      <a href="./">Voltar para a home</a>
    </main>
  </body>
</html>
